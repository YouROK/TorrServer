name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-22.04
    env:
      NODE_OPTIONS: --openssl-legacy-provider
      REACT_APP_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load toolchain versions
        run: grep -v '^#' .github/versions.env >> "$GITHUB_ENV"

      - name: Set registry image name
        run: echo "REGISTRY_IMAGE=${REPO,,}" >> "$GITHUB_ENV"
        env:
          REPO: "${{ github.repository }}"

      - name: Set NDK toolchain path
        run: echo "NDK_TOOLCHAIN=${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64" >> "$GITHUB_ENV"

      - name: Set up Go (default + before hooks)
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Install Go toolchain wrappers (GoReleaser)
        run: |
          go install golang.org/dl/go${{ env.GO_VERSION }}@latest
          go${{ env.GO_VERSION }} download
          go install golang.org/dl/go${{ env.GO_ANDROID_VERSION }}@latest
          go${{ env.GO_ANDROID_VERSION }} download

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
